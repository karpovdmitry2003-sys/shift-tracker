<!doctype html><html lang="ru"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Трекер смен</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#111827">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="stylesheet" href="style.css">
</head><body>
<div class="wrap">
<h1>Трекер смен</h1>

<div class="card">
<h2>Текущая смена</h2>
<div id="status">Смена не начата</div>
<div class="grid">
<div>Смена <b id="shift">00:00</b></div>
<div>Паузы <b id="breaks">00:00</b></div>
<div>Работа <b id="work">00:00</b></div>
</div>
<div class="btns">
<button id="startShift">Начать смену</button>
<button id="startBreak">Начать паузу</button>
<button id="endBreak">Закончить паузу</button>
<button id="endShift">Закончить смену</button>
</div>
</div>

<div class="card">
<h2>История</h2>
<input id="month" type="month">
<div id="summary"></div>
<div class="btns">
<button id="exportBtn">Экспорт</button>
<label class="buttonLike">Импорт<input hidden type="file" id="importFile"></label>
</div>
<div id="history"></div>
</div>
</div>
<script src="app.js"></script>
</body></html>
